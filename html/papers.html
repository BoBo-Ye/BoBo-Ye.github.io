<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Papers - BoBo Ye</title>
  <base href="../">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="papers-body">
  <main class="papers-page">
    <a class="back-link" href="index.html" aria-label="Back to home">Home</a>

    <header class="page-header">
      <h1>Papers</h1>
    </header>

    <section class="papers-content" aria-label="Papers">
      <div class="paper-list" data-papers-list></div>
      <p class="data-error" data-papers-error hidden>
        Papers could not be loaded. Please run this site from a local server or check data/papers/index.json.
      </p>
    </section>
  </main>

  <script
    type="module"
    src="js/papers-page.js"
    data-papers-page
    data-index-path="data/papers/index.json"
    data-list-selector="[data-papers-list]"
    data-error-selector="[data-papers-error]"
    data-page-label="papers"
  ></script>
</body>
</html>
